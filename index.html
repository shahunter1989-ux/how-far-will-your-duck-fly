<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>How Far Will Your Duck Flap?</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="How Far Will Your Duck Flap game">
      <section class="hud" aria-live="polite">
        <div>
          <span class="hud-label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="hud-label">Altitude</span>
          <strong><span id="altitude">0</span> m</strong>
        </div>
        <div>
          <span class="hud-label">Tap rate</span>
          <strong><span id="tap-rate">0.0</span>/s</strong>
        </div>
      </section>

      <canvas id="game" width="720" height="1080" aria-label="Top-down pond game area"></canvas>

      <aside class="status-panel" id="status-panel">
        <h1 id="state-title">How Far Will Your Duck Flap?</h1>
        <p id="state-message">Keep at least 4 taps per second to climb. Between 1 and 3 taps per second, the duck descends. Stop tapping and it drops fast.</p>
        <button id="restart" type="button">Start</button>
      </aside>

      <section class="rules" aria-label="Game thresholds">
        <div><b>Ascend</b><span>4+ taps/s</span></div>
        <div><b>Descend</b><span>1-3 taps/s</span></div>
        <div><b>Fall</b><span>0 taps for 0.75s</span></div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
